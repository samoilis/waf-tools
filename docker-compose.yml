services:
  db:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: wt_user
      POSTGRES_PASSWORD: jI+L0.==R7|HYdgB]/RC#Q7p!+-z8KuXE}A%1KQg7*QZLe.6
      POSTGRES_DB: waftools
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wt_user -d waftools"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build:
      context: .
      target: web
    expose:
      - "3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://wt_user:jI+L0.==R7|HYdgB]/RC#Q7p!+-z8KuXE}A%1KQg7*QZLe.6@db:5432/waftools
      # - LICENSE_KEY=paste-your-license-key-here
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

  proxy:
    image: nginx:alpine
    ports:
      - "8443:443"
      - "8008:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    restart: unless-stopped
    depends_on:
      - web

  worker:
    build:
      context: .
      target: worker
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://wt_user:jI+L0.==R7|HYdgB]/RC#Q7p!+-z8KuXE}A%1KQg7*QZLe.6@db:5432/waftools
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
