services:
  db:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: imperva
      POSTGRES_PASSWORD: imperva
      POSTGRES_DB: imperva_backup
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U imperva -d imperva_backup"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build:
      context: .
      target: web
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://imperva:imperva@db:5432/imperva_backup
      # - LICENSE_KEY=paste-your-license-key-here
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

  worker:
    build:
      context: .
      target: worker
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://imperva:imperva@db:5432/imperva_backup
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
